name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_PROJECT_PATH }}
            git pull origin main
            echo "=== docker-compose.yml contents ==="
            cat docker-compose.yml || echo "docker-compose.yml not found"
            docker compose build --no-cache
            docker compose up -d
            sleep 10
            echo "=== All running containers ==="
            docker ps --format "{{.Names}}"
            echo "=== Setup admin via docker exec ==="
            PHP_CONTAINER=$(docker ps --format "{{.Names}}" | grep -iE "php|back|app|petpet" | head -1)
            if [ -z "$PHP_CONTAINER" ]; then
              PHP_CONTAINER=$(docker ps --format "{{.Names}}" | head -1)
            fi
            echo "Using container: $PHP_CONTAINER"
            
            # Diagnostics: output all running containers to a file
            docker ps -a > api/containers.txt
            
            echo "=== Copying PHP files and seeding across ALL running containers ==="
            for c in $(docker ps --format "{{.Names}}"); do
              echo "Processing container: $c"
              
              # Copy files
              docker cp api/. "$c":/var/www/html/api/ 2>/dev/null
              if [ $? -eq 0 ]; then
                echo "✅ Copied files to $c"
                
                # Execute seeder
                echo "Running seeder in $c..."
                docker exec "$c" php /var/www/html/api/seed.php 2>&1
                
                # Run admin setup
                echo "Running admin setup in $c..."
                docker exec "$c" php -r "
                  \$host = getenv('DB_HOST') ?: 'db';
                  \$user = getenv('DB_USER') ?: 'petplace_user';
                  \$pass = getenv('DB_PASS') ?: '';
                  \$name = getenv('DB_NAME') ?: 'petplace';
                  try {
                    \$pdo = new PDO('mysql:host='.\$host.';dbname='.\$name.';charset=utf8mb4', \$user, \$pass);
                    \$hash = password_hash('admin123', PASSWORD_BCRYPT);
                    \$sql = 'INSERT INTO pengguna (nama_lengkap,email,password,peran,status) VALUES (\"Admin\",\"admin@petplace.id\",?,\"admin\",\"aktif\") ON DUPLICATE KEY UPDATE password=?,status=\"aktif\"';
                    \$s = \$pdo->prepare(\$sql);
                    \$s->execute([\$hash,\$hash]);
                    echo 'Admin OK: '.\$s->rowCount().' rows'.PHP_EOL;
                  } catch(Exception \$e) { echo 'Error: '.\$e->getMessage().PHP_EOL; }
                " 2>&1
              else
                echo "❌ Container $c does not have /var/www/html/api/ or docker cp failed"
              fi
            done


